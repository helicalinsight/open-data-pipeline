#-------------LOG CONFIG-------------
[logger_type]
level = ERROR

[log_path]
log_path = /home/opendatapipeline/logs

[loggers]
keys = root,openDataPipelineLogger

[handlers]
keys = debugHandler,infoHandler,errorHandler,warningHandler 

[formatters]
keys = debugFormatter,infoFormatter,errorFormatter

[logger_root]
level = DEBUG
handlers = errorHandler

[logger_openDataPipelineLogger]
level = DEBUG
handlers = debugHandler,infoHandler,errorHandler,warningHandler
qualname = openDataPipelineLogger
propagate = 0

[handler_warningHandler]
class = logging.handlers.TimedRotatingFileHandler
level = WARNING
formatter = infoFormatter
args = ('%(log_path)s/logs_warning.log', 'midnight', 1, 30)
suffix = %Y-%m-%d

[handler_debugHandler]
class = logging.handlers.TimedRotatingFileHandler
level = DEBUG
formatter = debugFormatter
args = ('%(log_path)s/logs_debug.log', 'midnight', 1, 30)
suffix = %Y-%m-%d

[handler_infoHandler]
class = logging.handlers.TimedRotatingFileHandler
level = INFO
formatter = infoFormatter
args = ('%(log_path)s/logs_info.log', 'midnight', 1, 30)
suffix = %Y-%m-%d

[handler_errorHandler]
class = logging.handlers.TimedRotatingFileHandler
level = ERROR
formatter = errorFormatter
args = ('%(log_path)s/logs_error.log', 'midnight', 1, 30)
suffix = %Y-%m-%d

[formatter_debugFormatter]
format = %(asctime)s-%(msecs)03d %(levelname)-8s [%(pathname)s:%(lineno)d:%(funcName)s] %(message)s

[formatter_infoFormatter]
format = %(asctime)s-%(msecs)03d %(levelname)-8s [%(pathname)s:%(lineno)d:%(funcName)s] %(message)s

[formatter_errorFormatter]
format = %(asctime)s-%(msecs)03d %(levelname)-8s [%(pathname)s:%(lineno)d:%(funcName)s] %(message)s
