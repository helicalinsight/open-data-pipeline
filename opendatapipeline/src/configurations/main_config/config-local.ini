#-------------LOG CONFIG-------------
[logger_type]
level = INFO

[log_path]
log_path = /tmp/opendatapipeline/logs

[loggers]
keys = root,openDataPipelineLogger

[handlers]
keys = debugHandler,infoHandler,errorHandler

[formatters]
keys = debugFormatter,infoFormatter,errorFormatter

[logger_root]
level = DEBUG
handlers = errorHandler

[logger_openDataPipelineLogger]
level = DEBUG
handlers = debugHandler,infoHandler,errorHandler
qualname = openDataPipelineLogger
propagate = 0

[handler_debugHandler]
class = logging.handlers.TimedRotatingFileHandler
level = DEBUG
formatter = debugFormatter
args = ('%(log_path)s/logs_debug', 'midnight', 1, 15)
suffix = %Y-%m-%d

[handler_infoHandler]
class = logging.handlers.TimedRotatingFileHandler
level = INFO
formatter = infoFormatter
args = ('%(log_path)s/logs_info', 'midnight', 1, 15)
suffix = %Y-%m-%d

[handler_errorHandler]
class = logging.handlers.TimedRotatingFileHandler
level = ERROR
formatter = errorFormatter
args = ('%(log_path)s/logs_error', 'midnight', 1, 15)
suffix = %Y-%m-%d

[formatter_debugFormatter]
format = %(asctime)s - %(levelname)s - %(message)s

[formatter_infoFormatter]
format = %(asctime)s - %(levelname)s - %(message)s

[formatter_errorFormatter]
format = %(asctime)s - %(levelname)s - %(message)s
