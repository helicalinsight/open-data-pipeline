    description: |
        # PostgreSQL Connector Documentation
        
        The PostgreSQL Connector allows you to establish a connection between your application and a PostgreSQL database. This connector facilitates the seamless interaction and data exchange between your application and the PostgreSQL database.
        
        ## Required Fields
        
        To successfully configure the PostgreSQL Connector, you need to provide the following essential information:
        
        1. **Host:**
           - The hostname or IP address of the machine where your PostgreSQL database is hosted.
        
        2. **Username:**
           - The username used to authenticate and access the PostgreSQL database.
        
        3. **Password:**
           - The password associated with the provided username for authentication.
        
        4. **Port:**
           - The port number on which the PostgreSQL database is listening for connections.
        
        5. **Database:**
           - The name of the PostgreSQL database you want to connect to.
        
        ## Pooling Options

         **Pooling options for PostgreSQL:**

         **`pool_size`:**
         - Specifies the number of connections to maintain in the pool. Default is 5.

         **`max_overflow`:**
         - Controls the number of connections that can be created beyond the pool size. Default is 10.

         **`pool_timeout`:**
         - Defines the number of seconds to wait before giving up on getting a connection from the pool. Default is 30 seconds.

         **`pool_recycle`:**
         - Determines the number of seconds after which a connection will be recycled. This helps to prevent potential connection leaks. Default is -1 (no recycling).

         **`poolclass`:**
         - Allows you to specify a custom pool class. The default pool class is `QueuePool`.

         **Metadata Configurations:**

         **`aod_schema`:**
         - Allows you to specify which `schema` to choose in Postgres. This helps make listing catalog faster. The value is taken as a list of schema names. E.g `{"aod_schema": ["schema1"]}`.

         **`aod_table`:**
         - Allows you to specify which `tables` to target in Postgres. This helps make listing catalog faster. Only tables that are present in database and in aod_table would show up in catalog. E.g `{"aod_table": ["table1", "table2"]}`.
         
         For more detailed information on these parameters, refer to the [Postgres Pooling Documentation](https://docs.sqlalchemy.org/en/20/core/pooling.html).


    parameters:
      basic_auth: [{ "name":"Host","variable":"host", "default":"localhost","type":"string","category":"input"},
