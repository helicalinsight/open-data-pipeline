    description: |
        # Snowflake Connector Documentation

        The Snowflake Connector allows you to establish a connection between your application and a snowflake database. This connector facilitates the seamless interaction and data exchange between your application and the snowflake database.

        ## Required Fields

        To successfully configure the Snowflake Connector, you need to provide the following essential information:

        1. **Username:**
           - The username used to authenticate and access the Snowflake database.

        2. **Password:**
           - The password associated with the provided username for authentication.

        3. **Account Identifier:**
           - The account identifier is the unique identifier associated with the Snowflake database for connections.
           For example, your account identifier should be formatted as

           - **orgname-account_name**
            
           If the orgname is "helical" and the account_name is "NM101", then the account identifier will be:
           - **helical-NM101**
           
           **For detailed guide check below documentation:**
               - [Account Identifier syntax reference](https://docs.snowflake.com/en/sql-reference/identifiers-syntax)
            
        4. **Database:**
            - The name of the Snowflake database you want to connect to.

        5. **Warehouse:**
            - The name of the Snowflake warehouse (virtual compute cluster) that will provide the computational resources for executing queries and data operations. The warehouse must be running to process queries.

        ## Pooling Options

         **Pooling options for Snowflake:**

         **`pool_size`:**
         - Specifies the number of connections to maintain in the pool. Default is 5.

         **`max_overflow`:**
         - Controls the number of connections that can be created beyond the pool size. Default is 10.

         **`pool_timeout`:**
         - Defines the number of seconds to wait before giving up on getting a connection from the pool. Default is 30 seconds.

         **`pool_recycle`:**
         - Determines the number of seconds after which a connection will be recycled. This helps to prevent potential connection leaks. Default is -1 (no recycling).

         **`poolclass`:**
         - Allows you to specify a custom pool class. The default pool class is `QueuePool`.

         **Metadata Configurations:**

         **`aod_schema`:**
         - Allows you to specify which `schema` to choose in Snowflake. This helps make listing catalog faster. The value is taken as a list of schema names. E.g `{"aod_schema": ["schema1"]}`.

         **`aod_table`:**
         - Allows you to specify which `tables` to target in Snowflake. This helps make listing catalog faster. Only tables that are present in database and in aod_table would show up in catalog. E.g `{"aod_table": ["table1", "table2"]}`.
         
         For more detailed information on these parameters, refer to the [Snowflake Pooling Documentation](https://docs.sqlalchemy.org/en/20/core/pooling.html).


    parameters:
      basic_auth: [{ "name":"Username","variable":"sfUser", "default":'',"type":"string","category":"input"},
                   { "name":"Password","variable": "sfPassword", "default": '',"type": "password","category": "input" },
                   { "name":"Account Identifier","variable":"sfAccountIdentifier", "default":"","type":"string","category":"input"},
                   { "name":"Database","variable":"sfDatabase", "default":"","type":"string","category":"input"},
                   { "name":"Warehouse","variable":"warehouse", "default":"","type":"string","category":"input"}]

