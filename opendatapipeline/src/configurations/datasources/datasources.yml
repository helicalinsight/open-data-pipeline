  - driver: google_sheets
    name: Google Sheets
    categoryName: spreadsheet
    verified: true
    categoryType: Cloud
    is_valid_dms_source: true
    available: true
    description: |
        # Google sheet Documentation

        The google sheet allows you to establish a connection between your application and a google sheet. This connector facilitates the seamless interaction and data exchange between your application and the google sheets.


        ## Required Fields

        To successfully configure the Google Sheets Connector, you need to provide the following essential information:

        1. **Upload Credentials:**
           - The credentials file in json format.

        2. **SheetId:**
           - The id of the google sheet.

        ## Obtaining Credentials

        **Steps to obtain crendtials.json file:**

        1. **Open Google Cloud Console:**
            - Go to [Google Console.](https://console.developers.google.com)

        2. **Create Project:**
            - Create a new project or select an existing one.

        3. **Enable the Google Sheets API:**
            - Navigate to APIs & Services > Library.
            - Search for "Google Sheets API" and click on it.
            - Click Enable.

        4. **Create Credentials:**
            - Navigate to APIs & Services > Credentials.
            - Click Create Credentials and choose  Service Account
            
            **For Service Account:**
         
            - Click Service Account.
            - Provide a name for the service account, service account id and optionally add a description.
            - Choose the role basic > (e.g., Editor) and create.
            - Click on the email created on service accounts and create key, select json format and click create.
            - Now the crendentials.json file will be downloaded.
            
        5. **Granting Access Permissions:**
            - After creating the key, press done and you return to the list of credentials.
            - As a last step, you need to give permission to access the spreadsheet to the service account.
            - Copy email address of the service account you’ve created and go to the spreadsheet you want to access 
              and Press ‘SHARE’ and paste the email address you’ve copied
         
        Now you have Google Sheets credentials with access to the spreadsheet.

        **Official Documentation:** [Google Sheets Documentation](https://developers.google.com/sheets)


    parameters:
        basic_auth: [ { "name":"Upload Credentials","variable":"credentials_object", "default":None,"type":"file","required":['json'],"category":"upload"},
                      { "name": "SheetId","variable": "sheet_id", "default": '',"type": "string","category": "input" }]

