    description: |
      # Couchbase Connector Documentation

      The Couchbase Connector allows you to establish a connection between your application and a Couchbase database. This connector facilitates seamless interaction with the Couchbase NoSQL document database using both key-value operations and N1QL (SQL++) queries.

      ## Required Fields

      To successfully configure the Couchbase Connector, you need to provide the following essential information:

      1. **Host**
         - Hostname or IP of your Couchbase cluster.
         - Examples: `localhost`, `couchbase.example.com`, `192.168.1.100`
      2. **Username**
         - Couchbase user with appropriate roles for the target bucket/scope/collection.
      3. **Password**
         - Password for the above username.
      4. **Port**
         - Management port is 8091 (REST/UI). **Note:** The Spark connector itself uses a connection string like `couchbase://<host>`; you generally **do not** append a port there.
      5. **Bucket**
         - Target bucket name (similar to a database).

      ## Optional Fields

      6. **Scope**
         - Scope within the bucket (Couchbase 7.0+). Default: `_default`.
      7. **Collection**
         - Collection within the scope (Couchbase 7.0+). Default: `_default`.

      ## IMPORTANT — Running Spark code in the ACE Editor

      The Couchbase Spark connector reads its **required properties at SparkSession creation** (from `SparkConf` on the builder).  
      Our launcher **extracts credentials from your ACE code before building the SparkSession**. Therefore, in your ACE snippet you **must** declare these constants exactly (case-sensitive):

      ```python
      # Required (parsed by the launcher → mapped to SparkConf on builder)
      COUCHBASE_HOST = "YOUR_HOST_OR_IP"        # e.g., "000.00.000.11" (no port)
      COUCHBASE_USERNAME = "YOUR_USERNAME"
      COUCHBASE_PASSWORD = "YOUR_PASSWORD"
      COUCHBASE_BUCKET = "YOUR_BUCKET"
      ```

      **Mapping performed by the launcher (before `getOrCreate()`)**
      - `COUCHBASE_HOST` → `spark.couchbase.connectionString = couchbase://<HOST>`
      - `COUCHBASE_USERNAME` → `spark.couchbase.username`
      - `COUCHBASE_PASSWORD` → `spark.couchbase.password`
      - `COUCHBASE_BUCKET` → `spark.couchbase.implicitBucket`


      ## Data Access Patterns
      
      - **Key-Value Operations:** Direct document access using document IDs
      - **N1QL Queries:** SQL-like queries for complex data retrieval
      - **Full-Text Search:** Advanced search capabilities across documents
      - **Analytics:** OLAP-style queries for business intelligence

      ## Supported Data Types

      - **JSON Documents:** Native support for structured and semi-structured data
      - **Binary Data:** Support for blob storage
      - **Counters:** Atomic increment/decrement operations
      - **Arrays and Objects:** Nested data structures

      **Official documentation:** https://docs.couchbase.com/home/index.html
    parameters:
      basic_auth: [
        { "name":"Host","variable":"host", "default":"localhost","type":"string","category":"input"},
        { "name":"Port","variable":"port", "default":"8091","type":"int","category":"input"},
        { "name":"Username","variable":"username", "default":"","type":"string","category":"input"},
        { "name": "Password","variable": "password", "default": "","type": "password","category": "input" },
        { "name":"Bucket","variable":"bucket", "default":"default","type":"string","category":"input"}
      ]

