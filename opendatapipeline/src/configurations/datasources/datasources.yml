    description: |
        # S3 Connector Documentation
        
        The S3 Connector allows you to connect to files stored in your Amazon S3 bucket. This enables loading of various data formats such as CSV, Excel, Parquet, Delta, and more into AskOnData.

        ## Required Fields
        
        To successfully configure the S3 Connector, you need to provide the following essential information:
        
        1. **AWS Access Key ID:**
        - The access key ID for your AWS IAM credentials with S3 access.
        
        2. **AWS Secret Access Key:**
        - The secret key associated with the access key ID.
        
        3. **Bucket Name:**
        - The name of the S3 bucket that contains your data files.
        
        4. **File Path:**
        - The path to the specific file (including folders if nested) within the bucket.
        
        5. **Region:**
        - The AWS region where the bucket is hosted (e.g., `us-west-2`).
        
        ## Supported File Types
        
        - `.csv`
        - `.parquet`
        - `.xlsx` / `.xls`
        - `.json`
        - `.txt`
        - `.delta` (using Delta Lake)
        - `.iceberg` (planned support)
        
         **Official Documentation:** [Amazon S3 Documentation](https://docs.aws.amazon.com/s3/)
   
    parameters:
            basic_auth: [
      { "name": "AWS Access Key ID", "variable": "aws_access_key", "default": "", "type": "string", "category": "input" },
      { "name": "AWS Secret Access Key", "variable": "aws_secret_key", "default": "", "type": "password", "category": "input" },
      { "name": "Bucket Name", "variable": "bucket_name", "default": "", "type": "string", "category": "input" },
      { "name": "AWS Region", "variable": "aws_region", "default": "us-east-1", "type": "string", "category": "input" }
    ]

