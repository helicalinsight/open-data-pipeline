  - driver: astra
    name: Astra
    verified: true
    pooling: true
    connector_type: native
    spark: spark-cassandra-connector_2.12-3.3.0
    categoryName: AI Database
    categoryType: nosql
    available: true
    description: |
        # Astra Connector Documentation
        
        The Astra Connector allows you to establish a connection between your application and a Astra database. This connector facilitates the seamless interaction and data exchange between your application and the Astra database.
        
        ## Required Fields
        
        To successfully configure the Astra Connector, you need to provide the following essential information:

        1. **Client ID:**
           - The client ID for authenticating with the Astra database.
        
        2. **Secret Key:**
           - The secret key associated with the provided client ID for authentication.
        
        3. **Upload Bundle:**
           - The secure connection bundle required to establish a connection with the Astra database.
        
        ## Obtaining Credentials

         To obtain the necessary credentials (Client ID, Secret Key and Bundle) for accessing your Astra database, follow these steps:

         1. **Sign Up or Log In to Astra:**
            - Go to the [Astra Portal](https://astra.datastax.com/) website and sign up for a new account or log in to your existing account.

         2. **Create a New Database or use existing database:**
            - After logging in, create a new database by following the on-screen instructions if it is not created yet ( you can use existing one).

         3. **Generate Client ID:**
            - In the Astra Portal, go to Tokens .
            - Select the role you want to attach to your token. The permissions for the selected role are shown.
            - Select Generate Token to generate a Client ID, Client Secret, and Token.
            - Download your token details by clicking download token details which will be in the json format.
            - The json file has Client ID, Client Secret, and Token. 

         4. **Download Secure Connection Bundle:**
            - Select your database and On the Overview page, select Connect.
            - In the Database Essentials section, click Get Bundle.
            - In the Secure Connect Bundle Download dialog box, use the Select a region dropdown menu to select the region for which you want to download the bundle. If you have multiple regions, you can download a bundle for each region.
            - To download the bundle to your local computer, click Download Secure Bundle.
            - The secure connect bundle downloads as a ZIP file named secure-connect-<database_name>.zip.

         By following these steps, you can obtain the necessary credentials to configure the Astra Connector and establish a secure connection to your Astra database. 

        ## Pooling Options
          
          **To provide pooling options you can refer this documentation:**
               - [Pooling Options for astra](https://docs.datastax.com/en/developer/python-driver/3.29/api/cassandra/cluster/index.html)

    parameters:
      basic_auth: [{ "name":"Client ID","variable":"client_id", "default":"","type":"string","category":"input"},
                   { "name":"Secret Key","variable":"secret", "default":"","type":"password","category":"input"},
        { "name":"Upload Bundle","variable":"bundle", "default":None,"type":"file","required":['zip'],"category":"upload"}]

