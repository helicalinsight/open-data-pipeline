    description: |
        # Databricks Connector Documentation

        The Databricks connector enables secure and performant access to **Databricks SQL Warehouses** from your application.

        ## Required Fields

        1. **Access Token (`password`):**
         - A [Databricks personal access token] with access to SQL Warehouse and data.

        2. **Workspace Hostname (`host`):**
         - The full domain of your Databricks workspace (e.g., `dbc-xxxx.cloud.databricks.com`).

        3. **HTTP Path (`http_path`):**
         - The SQL warehouse endpoint path. You can get it from the SQL Warehouse details screen.

        4. **Catalog (`catalog`)**
         - If provided, sets the catalog to use in Unity Catalog-enabled workspaces.

        5. **Schema (`schema`)**
         - The database schema to query within the selected catalog.

        ## Pooling Options

        **Pooling options for Databricks:**

        **`pool_size`:**
         - Specifies the number of connections to maintain in the pool. Default is 5.

         **`max_overflow`:**
         - Controls the number of connections that can be created beyond the pool size. Default is 10.

         **`pool_timeout`:**
         - Defines the number of seconds to wait before giving up on getting a connection from the pool. Default is 30 seconds.

         **`pool_recycle`:**
         - Determines the number of seconds after which a connection will be recycled. This helps to prevent potential connection leaks. Default is -1 (no recycling).

         **`poolclass`:**
         - Allows you to specify a custom pool class. The default pool class is `QueuePool`.

         **`aod_schema`:**
         - Allows you to specify which `schema` to choose in databricks. This helps make listing catalog faster. The value is taken as a list of schema names. E.g {"aod_schema": ["schema1"]}.

         **`aod_table`:**
         - Allows you to specify which `tables` to target in databricks schema. This helps make listing catalog faster. Only tables that are present in database and in aod_table would show up in catalog. E.g {"aod_table": ["table1", "table2"]}.
         
         For more detailed information on these parameters, refer to the [SQLAlchemy Pooling Documentation](https://docs.sqlalchemy.org/en/20/core/pooling.html).

    parameters:
      basic_auth: [ { "name": "Access Token", "variable": "access_token", "default": "", "type": "password", "category": "input" },
                    { "name": "Workspace Hostname", "variable": "host", "default": "", "type": "string", "category": "input" },
                    { "name": "HTTP Path", "variable": "http_path", "default": "", "type": "string", "category": "input" },
                    { "name": "Catalog", "variable": "catalog", "default": "", "type": "string", "category": "input" },
                    { "name": "Schema", "variable": "schema", "default": "", "type": "string", "category": "input" }]
